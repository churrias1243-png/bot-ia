><!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi amoor😻💗🥺</title>
<style>
body {
  font-family: sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
  margin: 0; padding: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  height: 100vh;
}
h1 { margin-top: 30px; text-shadow: 1px 1px 5px #00000080; }
#chat { 
  width: 90%; max-width: 500px; margin-top: 20px;
  display: flex; flex-direction: column; height: 70%; 
  border-radius: 10px; background: rgba(0,0,0,0.2); padding: 10px;
}
#messages { flex: 1; overflow-y: auto; padding: 10px; }
.message { padding: 8px 12px; margin: 5px 0; border-radius: 20px; max-width: 80%; word-wrap: break-word; }
.user { background: #1e90ff; align-self: flex-end; }
.bot { background: #ff69b4; align-self: flex-start; }
#inputArea { display: flex; margin-top: 10px; }
#input { flex: 1; padding: 8px 12px; border-radius: 20px; border: none; }
#send { padding: 8px 15px; border-radius: 20px; border: none; margin-left: 5px; background: #ff1493; color: white; cursor: pointer; }
</style>
</head>
<body>
<h1>Chat con Mi amoor😻💗🥺 🚀</h1>
<div id="chat">
  <div id="messages"></div>
  <div id="inputArea">
    <input type="text" id="input" placeholder="Escribe tu mensaje">
    <button id="send">Enviar</button>
  </div>
</div>

<script>
const input = document.getElementById('input');
const send = document.getElementById('send');
const messages = document.getElementById('messages');

async function enviarMensaje() {
  const text = input.value.trim();
  if(!text) return;
  messages.innerHTML += `<div class="message user">Tú: ${text}</div>`;
  input.value = '';
  messages.scrollTop = messages.scrollHeight;

  // Mostrar "escribiendo..." mientras responde
  const typing = document.createElement('div');
  typing.className = 'message bot';
  typing.textContent = 'Mi amoor😻💗🥺 está escribiendo...';
  messages.appendChild(typing);
  messages.scrollTop = messages.scrollHeight;

  try {
    const res = await fetch('/mensaje', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();

    // Reemplazar "escribiendo..." con la respuesta real
    typing.textContent = `Mi amoor😻💗🥺: ${data.reply}`;
    messages.scrollTop = messages.scrollHeight;
  } catch(e) {
    typing.textContent = 'Mi amoor😻💗🥺: Error de la IA 😭';
    messages.scrollTop = messages.scrollHeight;
  }
}

send.addEventListener('click', enviarMensaje);
input.addEventListener('keydown', e => { if(e.key === 'Enter') enviarMensaje(); });
</script>
</body>
</html>
