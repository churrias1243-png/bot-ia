<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bot IA</title>
<style>
body {
  font-family: sans-serif;
  background: linear-gradient(135deg, #6b73ff, #000dff);
  color: white;
  margin: 0; padding: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  height: 100vh;
}
#chat { 
  width: 90%; max-width: 500px; margin-top: 50px;
  display: flex; flex-direction: column; height: 70%; 
  border-radius: 10px; background: rgba(0,0,0,0.3); padding: 10px;
}
#messages { flex: 1; overflow-y: auto; padding: 10px; }
.message { padding: 8px 12px; margin: 5px 0; border-radius: 20px; max-width: 80%; }
.user { background: #1e90ff; align-self: flex-end; }
.bot { background: #32cd32; align-self: flex-start; }
#inputArea { display: flex; margin-top: 10px; }
#input { flex: 1; padding: 8px 12px; border-radius: 20px; border: none; }
#send { padding: 8px 15px; border-radius: 20px; border: none; margin-left: 5px; background: #ff69b4; color: white; cursor: pointer; }
</style>
</head>
<body>
<h1>Chat con Bot IA 🚀</h1>
<div id="chat">
  <div id="messages"></div>
  <div id="inputArea">
    <input type="text" id="input" placeholder="Escribe tu mensaje">
    <button id="send">Enviar</button>
  </div>
</div>

<script>
const input = document.getElementById('input');
const send = document.getElementById('send');
const messages = document.getElementById('messages');

async function enviarMensaje() {
  const text = input.value.trim();
  if(!text) return;
  messages.innerHTML += `<div class="message user">Tú: ${text}</div>`;
  input.value = '';
  messages.scrollTop = messages.scrollHeight;

  try {
    const res = await fetch('/mensaje', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    const data = await res.json();
    messages.innerHTML += `<div class="message bot">Bot: ${data.reply}</div>`;
    messages.scrollTop = messages.scrollHeight;
  } catch(e) {
    messages.innerHTML += `<div class="message bot">Bot: Error de la IA 😭</div>`;
    messages.scrollTop = messages.scrollHeight;
  }
}

send.addEventListener('click', enviarMensaje);
input.addEventListener('keydown', e => { if(e.key === 'Enter') enviarMensaje(); });
</script>
</body>
</html>
