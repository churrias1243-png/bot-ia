<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bot IA</title>
  <style>
    body { font-family: sans-serif; text-align: center; margin-top: 50px; }
    #chat { max-width: 500px; margin: auto; }
    #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; }
    #input { width: 80%; padding: 5px; }
    #send { padding: 5px 10px; }
    .user { color: blue; }
    .bot { color: green; }
  </style>
</head>
<body>
  <h1>Chat con Bot IA 🚀</h1>
  <div id="chat">
    <div id="messages"></div>
    <input type="text" id="input" placeholder="Escribe tu mensaje">
    <button id="send">Enviar</button>
  </div>

  <script>
    const input = document.getElementById('input');
    const send = document.getElementById('send');
    const messages = document.getElementById('messages');

    async function enviarMensaje() {
      const text = input.value.trim();
      if(!text) return;
      messages.innerHTML += `<div class="user">Tú: ${text}</div>`;
      input.value = '';

      const res = await fetch('/mensaje', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      const data = await res.json();
      messages.innerHTML += `<div class="bot">Bot: ${data.reply}</div>`;
      messages.scrollTop = messages.scrollHeight;
    }

    send.addEventListener('click', enviarMensaje);
    input.addEventListener('keydown', e => { if(e.key === 'Enter') enviarMensaje(); });
  </script>
</body>
</html>
